# CNB 流水线 — CC Switch
# 代码审查与自动化检查
###############################################################################

# ============================================================================
# 公共环境
# ============================================================================
.rust-env: &rust-env
  docker:
    image: rust:1.85-bookworm
  env:
    DEBIAN_FRONTEND: noninteractive

# ============================================================================
# 可复用 Stage 定义
# ============================================================================

# ---------- 安装系统依赖（Rust + Node.js） ----------
.install-deps: &install-deps
  name: 安装系统依赖
  script: |
    set -e
    apt-get update -qq
    apt-get install -y -qq \
      libwebkit2gtk-4.1-dev libgtk-3-dev \
      librsvg2-dev patchelf \
      curl ca-certificates gnupg
    curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
    apt-get install -y -qq nodejs
    npm install -g pnpm@latest | tail -1

# ============================================================================
# 流水线定义
# ============================================================================
$:
  # ── PR 代码审查 ──
  pull_request:
    - <<: *rust-env
      name: PR 代码审查
      stages:
        - *install-deps
        - name: 安装前端依赖 + 类型检查
          script: |
            pnpm install --frozen-lockfile 2>&1 | tail -3
            pnpm typecheck 2>&1 || echo "类型检查有警告"
        - name: Rust 编译检查
          script: |
            cargo check --lib --release 2>&1
        - name: Rust 单元测试
          script: |
            cargo test --lib 2>&1 | tail -5

main:
  # ── Push 自动检查 ──
  push:
    - <<: *rust-env
      name: 自动检查
      stages:
        - *install-deps
        - name: 安装前端依赖 + 类型检查
          script: |
            pnpm install --frozen-lockfile 2>&1 | tail -3
            pnpm typecheck 2>&1 || echo "类型检查有警告"
        - name: Rust 编译检查
          script: |
            cargo check --lib --release 2>&1
        - name: Rust 单元测试
          script: |
            cargo test --lib 2>&1 | tail -5
