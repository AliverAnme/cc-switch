# CNB 流水线 — CC Switch
# 多平台 Linux 安装包构建
###############################################################################
#
# 触发方式:
#   push (main)    → 构建 dev 安装包
#   tag_push       → 构建 release 安装包
#   pull_request   → 代码检查

# ============================================================================
# 复用环境片段
# ============================================================================
.rust-node-env: &rust-node-env
  docker:
    image: rust:1.85-bookworm
    volumes:
      - node_modules
  services:
    - docker
  env:
    CARGO_HOME: /usr/local/cargo
    PATH: /root/.cargo/bin:/usr/local/cargo/bin:/usr/local/node/bin:$PATH

# ============================================================================
# main 分支
# ============================================================================
main:
  push:
    - <<: *rust-node-env
      name: 构建 Linux 安装包
      stages:
        - name: 安装系统依赖
          script: |
            apt-get update -qq && apt-get install -y -qq \
              libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
              librsvg2-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev \
              patchelf pkg-config curl wget file openssl
        - name: 安装 pnpm
          script: npm install -g pnpm
        - name: 安装前端依赖
          script: pnpm install --frozen-lockfile
        - name: 构建前端
          script: pnpm build:renderer
        - name: 编译 Rust + 打包
          script: cargo tauri build --bundles deb,appimage 2>&1

# ============================================================================
# 兜底分支：PR 检查 + tag_push 发布
# ============================================================================
$:
  pull_request:
    - <<: *rust-node-env
      name: PR 代码检查
      stages:
        - name: 安装系统依赖
          script: |
            apt-get update -qq && apt-get install -y -qq \
              libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
              librsvg2-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev \
              patchelf pkg-config curl wget file openssl
        - name: 安装 pnpm
          script: npm install -g pnpm
        - name: 安装前端依赖
          script: pnpm install --frozen-lockfile
        - name: 类型检查
          script: pnpm typecheck 2>&1 || echo "跳过"
        - name: Rust 编译检查
          script: cargo check --lib --release
        - name: Rust 单元测试
          script: cargo test --lib 2>&1 | tail -5

  tag_push:
    - <<: *rust-node-env
      name: Release 构建 Linux 安装包
      stages:
        - name: 安装系统依赖
          script: |
            apt-get update -qq && apt-get install -y -qq \
              libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
              librsvg2-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev \
              patchelf pkg-config curl wget file openssl
        - name: 安装 pnpm
          script: npm install -g pnpm
        - name: 安装前端依赖
          script: pnpm install --frozen-lockfile
        - name: 构建前端
          script: pnpm build:renderer
        - name: 编译 Rust + 打包
          script: cargo tauri build --bundles deb,appimage 2>&1
